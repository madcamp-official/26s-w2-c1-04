name: memory_pager
description: "Memory Pager — 커플 낙서 호출기 (디자인 원본: 썸원 스타일 앱 디자인)"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/photos/

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.ttf
          weight: 400
        - asset: assets/fonts/Pretendard-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.ttf
          weight: 700
        - asset: assets/fonts/Pretendard-ExtraBold.ttf
          weight: 800
    - family: Gaegu
      fonts:
        - asset: assets/fonts/Gaegu-Regular.ttf
        - asset: assets/fonts/Gaegu-Bold.ttf
          weight: 700
