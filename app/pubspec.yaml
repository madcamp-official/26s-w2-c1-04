name: memory_pager
description: "Memory Pager — 커플 낙서 호출기 (디자인 원본: 썸원 스타일 앱 디자인)"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2              # REST (경량; dio 불필요)
  socket_io_client: ^3.1.2 # 실시간 /rt
  shared_preferences: ^2.3.2 # 기기별 device_uid 영속화(완성품 필수)
  image_picker: ^1.1.2       # 사진 촬영/갤러리 선택
  home_widget: ^0.6.0        # 안드로이드 홈 화면 위젯(펫 상태)
  firebase_core: ^3.8.1              # FCM 초기화(google-services.json 기반)
  firebase_messaging: ^15.1.6        # 백그라운드/종료 상태 푸시 수신
  flutter_local_notifications: ^18.0.1  # data-only 메시지를 알림 트레이에 렌더

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/photos/

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.ttf
          weight: 400
        - asset: assets/fonts/Pretendard-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.ttf
          weight: 700
        - asset: assets/fonts/Pretendard-ExtraBold.ttf
          weight: 800
    - family: Gaegu
      fonts:
        - asset: assets/fonts/Gaegu-Regular.ttf
        - asset: assets/fonts/Gaegu-Bold.ttf
          weight: 700
